# Fieldhouse — Local Development Stack
# Runs: Supabase (Postgres + Auth + Realtime + Storage) + Next.js web admin
#
# Usage:
#   docker compose up -d
#   Open http://localhost:3000 (web admin)
#   Supabase Studio: http://localhost:54323
#   Supabase API: http://localhost:54321

services:
  # ─── PostgreSQL (Supabase) ──────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.060
    container_name: fieldhouse-db
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fieldhouse_dev_password}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
    volumes:
      - fieldhouse_db_data:/var/lib/postgresql/data
      - ./supabase/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./supabase/migrations/002_rls_policies.sql:/docker-entrypoint-initdb.d/02_rls.sql
      - ./supabase/seed/dev_seed.sql:/docker-entrypoint-initdb.d/03_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Supabase Auth (GoTrue) ──────────────────────────────────
  auth:
    image: supabase/gotrue:v2.164.0
    container_name: fieldhouse-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54321:9999"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-fieldhouse_dev_password}@db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_LOG_LEVEL: debug

  # ─── Supabase REST API (PostgREST) ──────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: fieldhouse-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54323:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD:-fieldhouse_dev_password}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ─── Supabase Realtime ───────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.33.70
    container_name: fieldhouse-realtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "54324:4000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fieldhouse_dev_password}
      DB_NAME: postgres
      DB_SSL: "false"
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: "100"
      SECURE_CHANNELS: "true"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: "-proto_dist inet_tcp"

  # ─── Supabase Kong API Gateway ───────────────────────────────
  kong:
    image: kong:3.8.1
    container_name: fieldhouse-kong
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_started
      rest:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./docker/kong.yml:/home/kong/kong.yml:ro

  # ─── Fieldhouse Web Admin (Next.js) ─────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: fieldhouse-web
    restart: unless-stopped
    depends_on:
      - kong
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoxOTAwMDAwMDAwfQ.placeholder}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.placeholder}
      NEXT_PUBLIC_APP_URL: http://localhost:3000

volumes:
  fieldhouse_db_data:
